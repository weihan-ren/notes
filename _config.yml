title: Research Notes
description: AI · Development · Finance Knowledge Base
remote_theme: just-the-docs/just-the-docs
baseurl: "/notes"
url: "https://weihan-ren.github.io"

# 侧边栏导航
nav_enabled: true

# 标题锚点
heading_anchors: true

# 页面内 TOC
toc_enabled: true
toc:
  min_level: 2
  max_level: 3

# 搜索（必须独立配置块）
search:
  enabled: true
  heading_level: 2
  previews: 3

# 颜色方案
color_scheme: light

# 排除
exclude:
  - .gitignore
  - Gemfile
  - README.md
