{% if site.search.enabled or site.search_enabled %}
<div class="search" role="search">
  <div class="search-input-wrap">
    <input type="text" id="search-input" class="search-input" tabindex="0" placeholder="搜索知识库..." aria-label="搜索知识库" autocomplete="off">
    <label for="search-input" class="search-label">
      <svg viewBox="0 0 24 24" class="search-icon"><use xlink:href="#svg-search"></use></svg>
    </label>
  </div>
  <div id="search-results" class="search-results"></div>
</div>
{% endif %}

<nav role="navigation" aria-label="Page outline" id="site-nav">
  <div class="nav-caption">本页大纲</div>
  <ul class="nav-list" id="page-toc"><li class="nav-list-item">加载中...</li></ul>
</nav>

<script>
(function() {
  var toc = document.getElementById('page-toc');
  if (!toc) return;
  var selectors = ['.main-content', '.page', 'article', '.content', '#main-content'];
  var content = null;
  for (var i = 0; i < selectors.length; i++) {
    content = document.querySelector(selectors[i]);
    if (content) break;
  }
  if (!content) content = document.body;
  var headings = content.querySelectorAll('h2, h3, h4');
  var html = '';
  headings.forEach(function(h) {
    if (!h.id) {
      var base = h.textContent.trim().toLowerCase().replace(/[^\\w\\-\u4e00-\u9fa5]+/g, '-').replace(/^-+|-+$/g, '');
      var id = base || 'h';
      var idx = 1, orig = id;
      while (document.getElementById(id)) { id = orig + '-' + idx++; }
      h.id = id;
    }
    var indent = (h.tagName === 'H3' || h.tagName === 'H4') ? ' nav-list-item-sub' : '';
    html += '<li class="nav-list-item' + indent + '"><a href="#' + h.id + '" class="nav-list-link">' + h.textContent + '</a></li>';
  });
  toc.innerHTML = html || '<li class="nav-list-item">(无标题)</li>';
})();
</script>
