{% if site.nav_enabled and page.has_toc != false %}
<nav role="navigation" aria-label="Page outline" id="site-nav">
  <div class="nav-caption">本页大纲</div>
  <ul class="nav-list" id="page-toc">
    <!-- 由 JavaScript 动态生成 -->
  </ul>
</nav>

<script>
(function() {
  var toc = document.getElementById('page-toc');
  if (!toc) return;
  // 尝试找到常见的页面内容容器
  var selectors = ['.main-content', '.page', '.post', 'article', '.document', '.docs-main', '.entry-content', '.content'];
  var content = null;
  for (var i = 0; i < selectors.length; i++) {
    content = document.querySelector(selectors[i]);
    if (content) break;
  }
  if (!content) content = document.body;
  var headings = content.querySelectorAll('h2, h3, h4');
  var html = '';
  function slugify(text) {
    return text.trim().toLowerCase().replace(/[^\\w\\-\\u4e00-\\u9fa5]+/g, '-').replace(/^-+|-+$/g, '');
  }
  headings.forEach(function(h) {
    if (!h.id) {
      var base = slugify(h.textContent || h.innerText || 'heading');
      var id = base || 'heading';
      var idx = 1;
      while (document.getElementById(id)) { id = base + '-' + idx++; }
      h.id = id;
    }
    var indent = (h.tagName === 'H3' || h.tagName === 'H4') ? ' nav-list-item-sub' : '';
    html += '<li class="nav-list-item' + indent + '">';
    html += '<a href="#' + h.id + '" class="nav-list-link">' + h.textContent + '</a>';
    html += '</li>';
  });
  if (html) {
    toc.innerHTML = html;
  } else {
    toc.innerHTML = '<li class="nav-list-item">(无标题)</li>';
  }
})();
</script>
{% endif %}
