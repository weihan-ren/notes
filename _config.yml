title: Research Notes
description: AI · Development · Finance Knowledge Base
remote_theme: just-the-docs/just-the-docs

# 侧边栏：关闭全站导航，使用页面内 TOC
nav_enabled: false

# 标题锚点
heading_anchors: true

# 搜索
search_enabled: true
search:
  heading_level: 2
  previews: 3

# 页面内 TOC — 每页自动生成当前页大纲
toc_enabled: true
toc:
  min_level: 2
  max_level: 3

# 启用集合
collections:
  topics:
    output: true
    permalink: "/:collection/:path/"

# 颜色方案
color_scheme: light

# 辅助链接
aux_links:
  "← 返回索引":
    - "/"

# 页脚
footer_content: ""

# 排除文件
exclude:
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - README.md
